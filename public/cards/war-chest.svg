<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 120" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1c1808"/><stop offset="1" stop-color="#0b0e14"/></linearGradient>
    <radialGradient id="gl" cx="50%" cy="-10%" r="90%"><stop offset="0" stop-color="#e6c75a" stop-opacity=".34"/><stop offset="1" stop-color="#e6c75a" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="320" height="120" fill="url(#bg)"/>
  <rect width="320" height="120" fill="url(#gl)"/>
