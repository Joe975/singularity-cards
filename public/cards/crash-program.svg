  <path d="M300 14 l-22 0 m22 0 l0 22" fill="none" stroke="#e6715a" stroke-width="3" stroke-linecap="round"/>
  <!-- area under spike -->
  <path d="M104 96 L150 84 L176 88 L210 50 L240 58 L300 14 V104 H104 Z" fill="#e6715a" fill-opacity=".1"/>
  <g fill="#ffb199"><circle cx="210" cy="50" r="3"/><circle cx="300" cy="14" r="3.5"/></g>
  <line x1="104" y1="104" x2="300" y2="104" stroke="#b03a5a" stroke-opacity=".5"/>
</svg>
