<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 120" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1c0f12"/><stop offset="1" stop-color="#0b0e14"/></linearGradient>
    <radialGradient id="gl" cx="70%" cy="0%" r="90%"><stop offset="0" stop-color="#e6715a" stop-opacity=".45"/><stop offset="1" stop-color="#e6715a" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="320" height="120" fill="url(#bg)"/>
  <rect width="320" height="120" fill="url(#gl)"/>
  <!-- alert chevrons -->
  <g fill="#b03a5a"><path d="M20 30 l18 30 -18 30 -10 0 18 -30 -18 -30 z" opacity=".5"/><path d="M48 30 l18 30 -18 30 -10 0 18 -30 -18 -30 z" opacity=".75"/><path d="M76 30 l18 30 -18 30 -10 0 18 -30 -18 -30 z"/></g>
  <!-- racing spike (capability) -->
